<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="./favicon.png">

  <title>Vengeful Realms FormID Database</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      color: #f5f0df;
      line-height: 1.7;

      background:
        linear-gradient(rgba(9, 3, 2, 0.78), rgba(9, 3, 2, 0.92)),
        url("./background2.png?v=2");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    header {
      background: linear-gradient(135deg, #460F0F, #090302);
      padding: 45px 20px;
      text-align: center;
      border-bottom: 3px solid #D7C796;
    }

    .logo {
      width: 180px;
      height: auto;
      display: block;
      margin: 0 auto 15px auto;
    }

    header h1 {
      color: #D7C796;
      margin: 0;
      font-size: 38px;
      letter-spacing: 1px;
    }

    header p {
      color: #C5B171;
      margin-top: 10px;
      font-size: 18px;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 30px 20px;
    }

    section {
      background: rgba(9, 3, 2, 0.80);
      border: 1px solid #8F7634;
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 25px;
    }

    .notice {
      border: 2px solid #D7C796;
      background: rgba(215, 199, 150, 0.08);
    }

    h2 {
      color: #D7C796;
      border-bottom: 1px solid #8F7634;
      padding-bottom: 8px;
      margin-top: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #8F7634;
      background: rgba(9, 3, 2, 0.90);
      color: #f5f0df;
      font-family: Georgia, serif;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 8px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(143, 118, 52, 0.45);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #D7C796;
      background: rgba(70, 15, 15, 0.65);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr {
      background: rgba(70, 15, 15, 0.25);
    }

    tr:hover {
      background: rgba(215, 199, 150, 0.08);
    }

    .formid {
      font-family: Consolas, monospace;
      color: #D7C796;
      white-space: nowrap;
      font-weight: bold;
    }

    .copy-btn {
      padding: 7px 10px;
      background: rgba(215, 199, 150, 0.12);
      border: 1px solid #D7C796;
      color: #D7C796;
      border-radius: 5px;
      cursor: pointer;
      font-family: Georgia, serif;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(215, 199, 150, 0.25);
    }

    .copy-btn.copied {
      background: rgba(215, 199, 150, 0.30);
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border: 1px solid #8F7634;
      border-radius: 999px;
      color: #C5B171;
      background: rgba(9, 3, 2, 0.45);
      font-size: 13px;
    }

    th:nth-child(2),
td:nth-child(2) {
    width: 220px;
    white-space: nowrap;
}

    .warning {
      color: #D7C796;
      font-style: italic;
      font-size: 14px;
      margin-top: 4px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #AF9B5D;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .controls {
        grid-template-columns: 1fr;
      }

      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 15px;
        border: 1px solid #8F7634;
        border-radius: 8px;
        padding: 10px;
      }

      td {
        border-bottom: none;
        padding: 8px;
      }

      td::before {
        content: attr(data-label);
        display: block;
        color: #D7C796;
        font-weight: bold;
        margin-bottom: 2px;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="./Vengefullogo.png" alt="Vengeful Realms Logo" class="logo">
  <h1>Vengeful Realms</h1>
  <p>Skyrim FormID Database</p>
</header>

<main>

<section class="notice">
  <h2>FormID Database</h2>
  <p>
    Search vanilla Skyrim items and copy FormIDs quickly. This database does not include console commands, only item names and FormIDs.
  </p>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search item name, FormID, category, or section...">
    <select id="mainFilter">
      <option value="">All Main Categories</option>
    </select>
    <select id="sectionFilter">
      <option value="">All Sections</option>
    </select>
  </div>
</section>

<section>
  <h2>Items</h2>
  <p><span id="resultCount"></span></p>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Category</th>
        <th>Section</th>
        <th>FormID</th>
        <th>Copy</th>
      </tr>
    </thead>
    <tbody id="itemsTable"></tbody>
  </table>
</section>

</main>

<footer>
  Vengeful Realms Skyrim FormID Database
</footer>

const searchInput = document.getElementById("searchInput");
const mainFilter = document.getElementById("mainFilter");
const sectionFilter = document.getElementById("sectionFilter");
const itemsTable = document.getElementById("itemsTable");
const resultCount = document.getElementById("resultCount");

function uniqueValues(key) {
  return [...new Set(ITEMS.map(item => item[key]).filter(Boolean))].sort();
}

function fillFilters() {
  uniqueValues("main").forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    mainFilter.appendChild(option);
  });

  uniqueValues("section").forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    sectionFilter.appendChild(option);
  });
}

function copyFormID(formid, button) {
  navigator.clipboard.writeText(formid).then(() => {
    const original = button.textContent;
    button.textContent = "Copied!";
    button.classList.add("copied");

    setTimeout(() => {
      button.textContent = original;
      button.classList.remove("copied");
    }, 1500);
  });
}

function escapeHTML(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeJS(value) {
  return String(value).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}

function render() {
  const search = searchInput.value.toLowerCase();
  const mainValue = mainFilter.value;
  const sectionValue = sectionFilter.value;

  const filtered = ITEMS.filter(item => {
    const combined = `${item.name} ${item.formid} ${item.main} ${item.section}`.toLowerCase();
    return combined.includes(search)
      && (!mainValue || item.main === mainValue)
      && (!sectionValue || item.section === sectionValue);
  });

  resultCount.textContent = `${filtered.length} item(s) shown`;

  itemsTable.innerHTML = filtered.map(item => {
    const note = item.note ? `<div class="warning">${escapeHTML(item.note)}</div>` : "";
    const formidForCopy = escapeJS(item.formid);

    return `
      <tr>
        <td data-label="Item">${escapeHTML(item.name)} ${note}</td>
        <td data-label="Category"><span class="tag">${escapeHTML(item.main)}</span></td>
        <td data-label="Section"><span class="tag">${escapeHTML(item.section)}</span></td>
        <td data-label="FormID"><span class="formid">${escapeHTML(item.formid)}</span></td>
        <td data-label="Copy">
          <button class="copy-btn" onclick="copyFormID('${formidForCopy}', this)">📋 Copy FormID</button>
        </td>
      </tr>
    `;
  }).join("");
}

fillFilters();
render();

searchInput.addEventListener("input", render);
mainFilter.addEventListener("change", render);
sectionFilter.addEventListener("change", render);
</script>
